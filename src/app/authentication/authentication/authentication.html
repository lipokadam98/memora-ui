<main>
  <form [formGroup]="authenticationForm" class="flex flex-col items-center">
    <mat-form-field>
      <mat-label>Email</mat-label>
      <input formControlName="email" matInput placeholder="example@example.com" type="email" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Password</mat-label>
      <input formControlName="password" matInput placeholder="123456" type="password" />
    </mat-form-field>

    <div class="flex flex-row gap-2">
      <button (click)="onLogin()" [disabled]="authenticationForm.invalid" matButton="elevated">
        {{ 'authentication.login' | translate }}
      </button>
    </div>
  </form>
</main>
