<main class="flex flex-row items-center justify-center">
  <form [formGroup]="authenticationForm" class="flex flex-col gap-2 items-center w-fit">
    <h1 class="text-2xl">{{ 'authentication.login' | translate }}</h1>
    <mat-form-field>
      <mat-label>{{ 'authentication.email' | translate }}</mat-label>
      <input formControlName="email" matInput placeholder="example@example.com" type="email" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>{{ 'authentication.password' | translate }}</mat-label>
      <input autocomplete formControlName="password" matInput type="password" />
    </mat-form-field>

    @if (authStore.isLoading()) {
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    }

    <div class="flex flex-row gap-2">
      <button
        (click)="onLogin()"
        [disabled]="authenticationForm.invalid || authStore.isLoading()"
        matButton="elevated"
      >
        {{ 'authentication.login' | translate }}
      </button>
    </div>
  </form>
</main>
