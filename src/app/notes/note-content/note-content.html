<div class="flex flex-col justify-between p-5">
  <div class="flex flex-col gap-3">
    <h3 [title]="note.title" class="text-xl font-bold tracking-tight break-all">
      {{ note.title }}
    </h3>
    <span
      class="inline-flex self-start items-center rounded-md px-2 py-0.5 text-xs font-medium text-blue-400 border border-blue-900/50"
    >
      Note
    </span>
    <p
      class="text-base text-slate-400 overflow-y-auto wrap-break-word whitespace-pre-line max-h-[calc(100vh-16rem)]"
    >
      {{ note.content }}
    </p>
  </div>
  <div
    class="mt-6 pt-3 border-t border-slate-900 flex justify-between items-center text-xs text-slate-500"
  >
    <button (click)="deleteNote()" matIconButton>
      <mat-icon>delete</mat-icon>
    </button>
    <span>{{ note.createdAt | date }}</span>
  </div>
</div>
