<main class="flex flex-col gap-4 justify-center items-center">
  <h1>Notes</h1>
  @if (notesStore.notes().length > 0) {
    @for (note of notesStore.notes(); track note.id) {
      <ul>
        <li>{{ note.title }}</li>
        <li>{{ note.content }}</li>
      </ul>
    }
  } @else {
    <p>No notes found.</p>
  }
  <mat-form-field>
    <mat-label>Title</mat-label>
    <input matInput placeholder="Title" type="text" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Content</mat-label>
    <textarea matInput placeholder="Content" type="text"> </textarea>
  </mat-form-field>
  <button (click)="onAddNote()" mat-raised-button>Add Note</button>
</main>
