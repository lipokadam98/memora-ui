<main class="flex flex-col gap-4 justify-center items-center">
  <h1 class="text-3xl">{{ 'notes.title' | translate }}</h1>
  @if (notesStore.notes().length > 0) {
    @for (note of notesStore.notes(); track note.id) {
      <ul>
        <li>{{ note.title }}</li>
        <li>{{ note.content }}</li>
      </ul>
    }
  } @else {
    <p>No notes found</p>
  }
  <form [formGroup]="noteForm" class="flex flex-col gap-4 justify-center items-center">
    <mat-form-field>
      <mat-label>Title</mat-label>
      <input autofocus formControlName="title" matInput placeholder="Title" type="text" />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Content</mat-label>
      <textarea formControlName="content" matInput placeholder="Content" type="text"> </textarea>
    </mat-form-field>
    <button
      (click)="onAddNote()"
      [disabled]="noteForm.invalid || notesStore.isLoading()"
      mat-raised-button
    >
      {{ 'notes.add_note' | translate }}
    </button>
  </form>
</main>
