<nav
  class="flex flex-row gap-4 justify-between items-center h-12 p-2 sticky top-0 w-full border-b-2 z-10"
>
  <button [routerLink]="['/']" matButton>{{ 'app_name' | translate }}</button>

  <div class="flex flex-row gap-4">
    <button [routerLink]="['/']" matButton>{{ 'navbar.home' | translate }}</button>
    <button [routerLink]="['/gallery']" matButton>{{ 'navbar.gallery' | translate }}</button>
    <!--<button [routerLink]="['/notes']" matButton>{{ 'navbar.notes' | translate }}</button>-->
  </div>

  <section class="flex flex-row gap-4 items-center">
    @if (authStore.loginData()) {
      <button (click)="logout()" matButton>
        {{ 'authentication.logout' | translate }}
      </button>
    } @else {
      <button [routerLink]="['/authentication']" matButton>
        {{ 'authentication.login' | translate }}
      </button>
    }
    <button (click)="toggleDarkMode()" matIconButton>
      <mat-icon>dark_mode</mat-icon>
    </button>
  </section>
</nav>
